services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proxy
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proxy"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: proxy
      APIGEE_TOKEN_URL: https://icici-bank-azure-test.login.apigee.com/oauth/token
      APIGEE_CLIENT_ID: edgecli
      APIGEE_CLIENT_SECRET: edgeclisecret
      APIGEE_USERNAME: readonly@ext.icici.bank.in
      APIGEE_PASSWORD: Apigee@2028
      APIGEE_MGMT_API_URL: https://api.enterprise.apigee.com/v1/organizations/icici-nonprod/apis
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
